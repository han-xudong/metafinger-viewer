syntax = "proto3";

// Namespace
package DualFinger;

message DualFinger
{
    double timestamp = 1;
    bytes img_0 = 2;
    repeated double pose_0 = 3;
    repeated double force_0 = 4;
    repeated double node_0 = 5;
    bytes img_1 = 6;
    repeated double pose_1 = 7;
    repeated double force_1 = 8;
    repeated double node_1 = 9;
}